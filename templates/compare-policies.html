<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsureAI | Compare Policies</title>
  <meta name="description" content="Compare insurance policies side-by-side with AI-powered insights">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; overflow: hidden; background: radial-gradient(circle at top left, #0f172a, #020617); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
    .active-nav { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
    .transition-all-custom { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .type-btn-active { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .better-val { color: #34d399; }
    .worse-val { color: #f87171; }
  </style>
</head>
<body class="text-slate-100">
  <div class="h-screen flex overflow-hidden">

    <!-- LEFT SIDEBAR -->
    <aside class="w-[240px] flex-shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col z-50">
      <div class="p-6">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/20">
            <iconify-icon icon="lucide:shield-check" class="text-2xl"></iconify-icon>
          </div>
          <div>
            <h1 class="font-bold text-white leading-none">InsureAI</h1>
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider mt-1">Your AI Advisor</p>
          </div>
        </div>
      </div>
      <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto custom-scrollbar">
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all-custom">
          <iconify-icon icon="lucide:layout-dashboard"></iconify-icon> Dashboard</a>
        <a href="/compare-policies" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium active-nav transition-all-custom">
          <iconify-icon icon="lucide:columns-2"></iconify-icon> Compare Policies</a>
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all-custom">
          <iconify-icon icon="lucide:message-square-text"></iconify-icon> AI Chat Assistant</a>
        <a href="/catalog" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all-custom">
          <iconify-icon icon="lucide:book-open"></iconify-icon> Insurance Catalog</a>
        <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all-custom">
          <iconify-icon icon="lucide:settings"></iconify-icon> Profile Settings</a>
      </nav>
      <div class="p-4">
        <div class="bg-indigo-900/20 p-4 rounded-2xl mb-4 border border-indigo-500/20">
          <p class="text-xs font-bold text-white">Need Help?</p>
          <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">Our AI assistant is here to help you choose the best policy.</p>
          <button onclick="window.location='/'" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-bold py-2 px-4 rounded-lg transition-colors">Ask AI Assistant</button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto custom-scrollbar">
      <header class="h-20 flex items-center justify-between px-8 bg-slate-950/40 backdrop-blur-xl border-b border-white/5 sticky top-0 z-40">
        <div>
          <h2 class="text-2xl font-bold text-white tracking-tight">Compare Policies</h2>
          <p class="text-sm text-slate-500">Select two policies and compare them side-by-side.</p>
        </div>
      </header>

      <div class="p-8 space-y-8 pb-16">
        <!-- Type Selector -->
        <div class="flex gap-3">
          <button id="cmp-type-health" class="type-btn type-btn-active flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all-custom border border-transparent" data-type="health">
            <iconify-icon icon="lucide:heart-pulse"></iconify-icon> Health Insurance
          </button>
          <button id="cmp-type-vehicle" class="type-btn flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-800/50 text-slate-400 border border-white/5 hover:bg-slate-800 hover:text-white transition-all-custom" data-type="vehicle">
            <iconify-icon icon="lucide:car"></iconify-icon> Vehicle Insurance
          </button>
        </div>

        <!-- Policy Selectors -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="glass-card rounded-2xl p-6 space-y-3">
            <label class="text-sm font-bold text-white flex items-center gap-2"><iconify-icon icon="lucide:file-badge" class="text-indigo-400"></iconify-icon> Policy 1</label>
            <select id="policy-select-1" class="w-full bg-slate-900/70 border border-white/5 rounded-xl px-4 py-3 text-sm text-white appearance-none cursor-pointer focus:ring-2 focus:ring-indigo-500/50 outline-none">
              <option value="">-- Select a Policy --</option>
            </select>
          </div>
          <div class="glass-card rounded-2xl p-6 space-y-3">
            <label class="text-sm font-bold text-white flex items-center gap-2"><iconify-icon icon="lucide:file-badge" class="text-purple-400"></iconify-icon> Policy 2</label>
            <select id="policy-select-2" class="w-full bg-slate-900/70 border border-white/5 rounded-xl px-4 py-3 text-sm text-white appearance-none cursor-pointer focus:ring-2 focus:ring-indigo-500/50 outline-none">
              <option value="">-- Select a Policy --</option>
            </select>
          </div>
        </div>

        <!-- Compare Button -->
        <div class="flex justify-center">
          <button id="compare-now-btn" class="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-sm font-bold shadow-lg shadow-indigo-600/20 hover:scale-[1.03] transition-transform disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            <iconify-icon icon="lucide:sparkles"></iconify-icon> Compare Policies
          </button>
        </div>

        <!-- Comparison Result -->
        <div id="comparison-result" class="hidden space-y-6 fade-in">
          <div class="glass-card rounded-2xl overflow-hidden">
            <div class="p-5 border-b border-white/5 flex items-center justify-between">
              <h3 class="text-lg font-bold text-white flex items-center gap-2"><iconify-icon icon="lucide:git-compare" class="text-indigo-400"></iconify-icon> Side-by-Side Comparison</h3>
              <span id="winner-badge" class="hidden px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-bold rounded-full border border-emerald-500/20"></span>
            </div>
            <div class="overflow-x-auto">
              <table id="comparison-table" class="w-full text-left">
                <thead id="comp-thead"></thead>
                <tbody id="comp-tbody" class="divide-y divide-white/5"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/compare.js"></script>
</body>
</html>
